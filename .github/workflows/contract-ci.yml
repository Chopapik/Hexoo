name: Contract CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  deterministic-node:
    name: Deterministic node checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:node

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: deterministic-node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build

  # Future isolated jobs:
  # - browser/storybook contracts with their own checkout and browser cache
  # - DB/Supabase contracts with local service containers
  # - E2E smoke tests with isolated browser sessions
