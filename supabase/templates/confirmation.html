<!doctype html>
<html lang="pl">

<body style="font-family: Arial, sans-serif; line-height: 1.5;">
  <h2>Aktywuj konto w Hexoo</h2>

  <p>Cześć!</p>

  <p>Kliknij poniższy przycisk, żeby potwierdzić email i aktywować konto.</p>

  <p>
    <a href="{{ .SiteURL }}/auth/confirm?token_hash={{ .TokenHash }}&type=email" style="
          display: inline-block;
          padding: 12px 18px;
          border-radius: 8px;
          background: #111;
          color: #fff;
          text-decoration: none;
        ">
      Aktywuj konto
    </a>
  </p>

  <p>Jeśli to nie Ty zakładałeś konto, zignoruj tę wiadomość.</p>
</body>

</html>
