<!doctype html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aktywuj konto</title>
</head>
<body style="margin:0;padding:24px;font-family:Arial,sans-serif;color:#111827;background:#f9fafb;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:600px;margin:0 auto;background:#ffffff;border:1px solid #e5e7eb;border-radius:8px;">
    <tr>
      <td style="padding:24px;">
        <h1 style="margin:0 0 16px 0;font-size:22px;line-height:1.3;">Aktywuj konto w Hexoo</h1>
        <p style="margin:0 0 16px 0;font-size:16px;line-height:1.6;">
          Cześć {{ .Email }},
        </p>
        <p style="margin:0 0 24px 0;font-size:16px;line-height:1.6;">
          Kliknij przycisk poniżej, aby potwierdzić adres email i aktywować konto.
        </p>
        <p style="margin:0 0 24px 0;">
          <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:12px 18px;background:#111827;color:#ffffff;text-decoration:none;border-radius:6px;font-weight:600;">
            Aktywuj konto
          </a>
        </p>
        <p style="margin:0 0 8px 0;font-size:14px;line-height:1.6;color:#4b5563;">
          Jeśli przycisk nie działa, skopiuj i wklej ten link do przeglądarki:
        </p>
        <p style="margin:0;font-size:14px;line-height:1.6;word-break:break-all;">
          <a href="{{ .ConfirmationURL }}" style="color:#2563eb;">{{ .ConfirmationURL }}</a>
        </p>
      </td>
    </tr>
  </table>
</body>
</html>
