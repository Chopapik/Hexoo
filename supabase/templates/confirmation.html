<!doctype html>
<html lang="pl">

<body
  style="margin: 0; padding: 0; background: #050505; color: #ffffff; font-family: 'Plus Jakarta Sans', Arial, sans-serif; line-height: 1.5;">
  <div style="box-sizing: border-box; width: 100%; min-height: 100%; padding: 48px 20px; background: #050505;">
    <div
      style="box-sizing: border-box; max-width: 560px; margin: 0 auto; padding: 32px; border: 1px solid rgba(255,255,255,0.10); border-radius: 20px; background: rgba(255,255,255,0.04);">
      <h2 style="margin: 0 0 16px; color: #ffffff; font-size: 28px; line-height: 1.2; font-weight: 800;">
        Aktywuj konto w Hexoo
      </h2>

      <p style="margin: 0 0 12px; color: rgba(255,255,255,0.86); font-size: 16px;">
        Cześć!
      </p>

      <p style="margin: 0 0 28px; color: rgba(255,255,255,0.72); font-size: 16px;">
        Kliknij poniższy przycisk, żeby potwierdzić email i aktywować konto.
      </p>

      <p style="margin: 0 0 28px;">
        <a href="{{ .SiteURL }}/auth/confirm?token_hash={{ .TokenHash }}&type=email"
          style="display: inline-block; box-sizing: border-box; min-width: 36px; height: 36px; padding: 0 16px; border-radius: 24px; background: #c026d3; background-image: linear-gradient(180deg, #c026d3 0%, #86198f 100%); color: #ffffff; font-size: 16px; font-weight: 700; line-height: 34px; text-align: center; text-decoration: none;">
          Aktywuj konto
        </a>
      </p>

      <p style="margin: 0; color: rgba(255,255,255,0.56); font-size: 14px;">
        Jeśli to nie Ty zakładałeś konto, zignoruj tę wiadomość.
      </p>
    </div>
  </div>
</body>

</html>
